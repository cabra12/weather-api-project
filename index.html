<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>Weather App</h1>
    <div class="card">
        <div class="input-container">
            <input type="text" id="city" placeholder="Enter a city..">
            <button class="submit-button">Search</button>
        </div>

        <div class="main-row">
            <div class="city-block">
                <h2 class="city-name">Arrecife</h2>
                <div class="condition">Clouds &nbsp;·&nbsp; Max: 25° &nbsp; Min: 25°</div>
                <div class="temp-display">25°F</span></div>
            </div>
    
            <div class="weather-icon">
                <!-- <img src="partly-cloudy.png" alt="Partly Cloudy"> -->
                icon here
            </div>
    
            <div class="details-block">
                <p>Friday 12:11</p>
                <p>Humidity: 73%</p>
                <p>Wind: 32 Km/H</p>
            </div>
        </div>

    </div>



</body>
</html>
